<!DOCTYPE html>
<html>
	<head>
			<meta charset="UTF-8">
			<meta name="theme-color" content="#111111">
			<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
			<title>hideout</title>

			<!-- icons -->
			<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
			<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
			
			<!-- styles -->
			<link rel="stylesheet" href="styles.css">

			<!-- material icons -->
			<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" crossorigin>
			<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=mobile_rotate" crossorigin />
			
			<!-- google fonts -->
			<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
			<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
			<link href="https://fonts.googleapis.com/css2?family=Francois+One&family=Squada+One&family=VT323&display=swap" rel="stylesheet" crossorigin>



			<!-- <script src="./build/godot.js"></script> -->
			<script src="script.js"></script>

	</head>
	<body>
		<div id="loading-container" class="scanline">
			<p id="loading"></p>
		</div>
		<div id="terminal-clip">

			<div id="terminal-container">
				<div id="rotate-device-popup" class="scanline">
					<div class="material-symbols-outlined">
						mobile_rotate
					</div>
					<p>ROTATE DEVICE</p>
				</div>
				<div id="terminal">
					<div id="navbar">
						<button class="nav-button active" id="about-button" onclick="navButtonClicked(this)">About</button>
						<button class="nav-button" id="contact-button" onclick="navButtonClicked(this)">Contact</button>
						<button class="nav-button" id="test-button" onclick="navButtonClicked(this)">Test</button>
						<button class="nav-button" id="resources-button" onclick="navButtonClicked(this)">Resources</button>
						<button class="nav-button" id="settings-button" onclick="navButtonClicked(this)">
							<i class="material-icons">settings</i>
						</button>
					</div>
			
					<div id="content">
						<div id="about" class="section">
							<h1>About</h1>
							<p>TODO</p>
						</div>
						<div id="contact" class="section" style="display:none;">
							<h1>Contact</h1>
							<p>TODO</p>
							<!-- <iframe src="https://www.youtube-nocookie.com/embed/Ata9cSC2WpM?si=8J0flyHd64mnk2Xo;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
						</div>
						<div id="resources" class="section" style="display:none;">
							<h1>Resources</h1>
							<p>These are the resources I used to create this website. </p>
							<h2>Godot</h2>
							<h3>Website</h3>
							<p>Godot is an open source game engine. It is used here for the 3D environment, </p>
						</div>
						<div id="test" class="section" style="display:none;">
							<h1>Test</h1>
							<p>TODO</p>
							<!-- <iframe src="https://www.youtube.com/embed/Ata9cSC2WpM?si=gA-oNN5VGMPu7Bmr&amp;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
						</div>
						<div id="settings" class="section" style="display:none;">
							<h1>Settings</h1>
							<input type="checkbox" id="show-debug" name="showDebug" value="debug">
							<label for="show-debug">Show debug info</label><br>
							<!-- <iframe src="https://www.youtube.com/embed/Ata9cSC2WpM?si=gA-oNN5VGMPu7Bmr&amp;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
						</div>
	
					</div>
				</div>
		</div>
		</div>
		<canvas id="canvas"></canvas>
		<dialog id="username-popup" class="scanline">
			<form id="username-form" autocomplete="off">
				<input type="text" id="username-textbox" name="username" placeholder="Enter your username..." maxlength="20" required>
				<button id="submit-username-button" type="submit" >OK</button>
			</form>
		</dialog>
	</body>
</html>
