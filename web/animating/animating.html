<!DOCTYPE html>
<html class="sub-page">
	<head>
		<link rel="stylesheet" href="../styles.css">
		<link rel="stylesheet" href="./section-styles.css">

		<!-- google fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Francois+One&family=Squada+One&family=VT323&display=swap" rel="stylesheet">
	</head>

	<style>
		body { opacity: 0; transition: opacity 0.3s; }
	</style>
	
	<script>
		document.fonts.ready.then(function () {
			document.body.style.opacity = "1";
		});
	</script>

	<body class="section">
		<fieldset class="section-header">
			<h1>Animating</h1>
		</fieldset>

		<div class="scroll-container">
			<fieldset class="scrollable">



			</fieldset>
		</div>

	</body>
</html>
