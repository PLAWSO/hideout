<!DOCTYPE html>
<html class="sub-page">
	<head>
		<link rel="stylesheet" href="../styles.css">
		<link rel="stylesheet" href="./section-styles.css">

		<script src="../section-script.js"></script>
		<script src="./chat.js"></script>

		<!-- google fonts -->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Francois+One&family=Squada+One&family=VT323&display=swap" rel="stylesheet">
	</head>

	<body class="section">
		<fieldset class="section-header">
			<h1>Chat</h1>
			
			<button class="nav-button" id="reader-view-button" onclick="openInReaderView()">
				<i class="material-symbols-outlined">menu</i>
			</button>
		</fieldset>

		<div class="scroll-container">
			<fieldset class="scrollable">
				<p>this needs to be cleaned up, but it mostly works! </p>
				<br>
				<form id="chat-form" onsubmit="_onSubmitChat(event)">
					<input type="text" id="username-textbox" name="username" placeholder="Username" maxlength="20">
					<input type="text" id="website-textbox" name="url" placeholder="Website" maxlength="40">
					<input type="text" id="message-textbox" name="message" placeholder="Message" maxlength="200">
					<button type="submit">submit</button>
				</form>

				<button onclick="moveToPreviousPage()">
					prev
				</button>

				<button onclick="moveToNextPage()">
					next
				</button>

				<div id="chats-container">

				</div>


			</fieldset>
		</div>

	</body>
</html>
