<!DOCTYPE html>
<html>
	<head>
			<meta charset="UTF-8">
			<meta name="theme-color" content="#111111">
			<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
			<title>hideout</title>

			<!-- icons -->
			<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
			<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
			
			<!-- styles -->
			<link rel="stylesheet" href="styles.css">

			<!-- material icons -->
			<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" crossorigin>
			<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=mobile_rotate" crossorigin />
			
			<!-- google fonts -->
			<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
			<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
			<link href="https://fonts.googleapis.com/css2?family=Francois+One&family=Squada+One&family=VT323&display=swap" rel="stylesheet" crossorigin>



			<script src="./build/godot.js"></script>
			<script src="script.js"></script>

	</head>
	<body>
		<div id="loading-container" class="scanline">
			<p id="loading"></p>
		</div>
		<div id="terminal-clip">

			<div id="terminal-container">
				<div id="rotate-device-popup" class="scanline">
					<div class="material-symbols-outlined">
						mobile_rotate
					</div>
					<p>ROTATE DEVICE</p>
				</div>
				<div id="terminal">
					<div id="navbar">
						<button class="nav-button" id="intro-button">Intro</button>
						<button class="nav-button" id="3d-asset-creation">3D Asset Creation</button>
						<button class="nav-button" id="modeling-button">Modeling</button>
						<button class="nav-button" id="texturing-button">Texturing</button>
						<button class="nav-button" id="resources-button">Resources</button>
						<button class="nav-button" id="settings-button">
							<i class="material-icons">settings</i>
						</button>
					</div>
			
					<div id="content">
						<object id="content-frame"></object>
					</div>
				</div>
		</div>
		</div>
		<canvas id="canvas"></canvas>
		<dialog id="username-popup" class="scanline">
			<form id="username-form" autocomplete="off">
				<input type="text" id="username-textbox" name="username" placeholder="Enter your username..." maxlength="20" required>
				<button id="submit-username-button" type="submit" >OK</button>
			</form>
		</dialog>
	</body>
</html>
